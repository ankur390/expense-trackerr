<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#667eea">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #667eea, #764ba2);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* Container */
.container {
    background: white;
    padding: 25px;
    border-radius: 15px;
    width: 380px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
}

h1 {
    margin-bottom: 15px;
}

.balance h2 {
    color: #4CAF50;
    margin: 10px 0;
}

/* Form */
.form input, .form select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.btn {
    width: 100%;
    padding: 10px;
    background: linear-gradient(135deg, #ff7eb3, #ff758c);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

/* List */
.list {
    margin-top: 15px;
    max-height: 150px;
    overflow-y: auto;
}

.item {
    display: flex;
    justify-content: space-between;
    padding: 8px;
    margin: 5px 0;
    border-radius: 8px;
    color: white;
}

.income { background: #4CAF50; }
.expense { background: #f44336; }

.delete {
    cursor: pointer;
    font-weight: bold;
}

/* Chart */
canvas {
    margin-top: 15px;
}

/* Premium Footer */
.footer {
    position: fixed;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    backdrop-filter: blur(10px);
    background: rgba(255, 255, 255, 0.15);
    padding: 12px 20px;
    border-radius: 12px;
    text-align: center;
    color: white;
    font-size: 13px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    animation: fadeIn 1s ease-in-out;
}

.footer-content p {
    margin: 2px 0;
}

.highlight {
    color: #ffd166;
    font-weight: bold;
}

.contributors {
    font-size: 12px;
    opacity: 0.9;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translate(-50%, 20px);
    }
    to {
        opacity: 1;
        transform: translate(-50%, 0);
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>💸 Expense Tracker</h1>

    <div class="balance">
        <h3>Balance</h3>
        <h2 id="balance">₹0</h2>
    </div>

    <div class="form">
        <input type="text" id="text" placeholder="Description">
        <input type="number" id="amount" placeholder="Amount">
        <select id="type">
            <option value="income">Income</option>
            <option value="expense">Expense</option>
        </select>
        <button class="btn" onclick="addTransaction()">Add</button>
    </div>

    <div class="list" id="list"></div>

    <canvas id="chart"></canvas>
</div>

<!-- Footer -->
<footer class="footer">
    <div class="footer-content">
        <p>© 2026 All Rights Reserved</p>
        <p>Created by <span class="highlight">Ankur Gautam</span></p>
        <p class="contributors">Contributors: Ankur Gautam • Himanshu</p>
    </div>
</footer>

<script>
let transactions = [];
let chart;

/* Add */
function addTransaction() {
    const text = document.getElementById('text').value;
    const amount = document.getElementById('amount').value;
    const type = document.getElementById('type').value;

    if(text === "" || amount === "") {
        alert("Fill all fields");
        return;
    }

    transactions.push({
        id: Date.now(),
        text,
        amount: +amount,
        type
    });

    updateUI();
    updateChart();

    document.getElementById('text').value = "";
    document.getElementById('amount').value = "";
}

/* UI */
function updateUI() {
    const list = document.getElementById('list');
    list.innerHTML = "";

    let balance = 0;

    transactions.forEach(t => {
        balance += t.type === "income" ? t.amount : -t.amount;

        const div = document.createElement('div');
        div.classList.add('item', t.type);

        div.innerHTML = `
            ${t.text} - ₹${t.amount}
            <span class="delete" onclick="deleteTransaction(${t.id})">x</span>
        `;

        list.appendChild(div);
    });

    document.getElementById('balance').innerText = "₹" + balance;
}

/* Delete */
function deleteTransaction(id) {
    transactions = transactions.filter(t => t.id !== id);
    updateUI();
    updateChart();
}

/* Chart */
function updateChart() {
    const income = transactions
        .filter(t => t.type === "income")
        .reduce((a, b) => a + b.amount, 0);

    const expense = transactions
        .filter(t => t.type === "expense")
        .reduce((a, b) => a + b.amount, 0);

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById('chart'), {
        type: 'doughnut',
        data: {
            labels: ["Income", "Expense"],
            datasets: [{
                data: [income, expense],
                backgroundColor: ["#4CAF50", "#f44336"]
            }]
        }
    });
}

/* PWA */
if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js");
    });
}
</script>

</body>
</html>
